<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Page Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1208;
      --paper: #f5ede0;
      --cream: #ede0cc;
      --amber: #c8873a;
      --amber-dark: #a06828;
      --shadow: rgba(26,18,8,0.15);
    }

    body {
      background: var(--paper);
      font-family: 'DM Mono', monospace;
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(200,135,58,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(200,135,58,0.06) 0%, transparent 50%);
    }

    .card {
      background: #fdf6ec;
      border-radius: 4px;
      width: 100%;
      max-width: 380px;
      box-shadow:
        0 2px 4px var(--shadow),
        0 8px 32px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      border: 1px solid rgba(200,135,58,0.2);
    }

    .header {
      background: var(--ink);
      padding: 28px 28px 24px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '❧';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 48px;
      opacity: 0.08;
      color: var(--amber);
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--paper);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .header p {
      font-size: 11px;
      color: rgba(245,237,224,0.5);
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .body {
      padding: 28px;
    }

    .toggle-wrap {
      display: flex;
      background: var(--cream);
      border-radius: 3px;
      padding: 3px;
      margin-bottom: 24px;
      border: 1px solid rgba(200,135,58,0.15);
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(26,18,8,0.5);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: var(--ink);
      color: var(--paper);
    }

    .input-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(26,18,8,0.45);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="number"] {
      flex: 1;
      padding: 14px 16px;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--ink);
      background: var(--cream);
      border: 1px solid rgba(200,135,58,0.2);
      border-radius: 3px;
      outline: none;
      -moz-appearance: textfield;
      transition: border-color 0.2s;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--amber);
    }

    button.convert {
      padding: 14px 18px;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    button.convert:active {
      background: var(--amber-dark);
      transform: scale(0.97);
    }

    .result-box {
      background: var(--cream);
      border: 1px solid rgba(200,135,58,0.2);
      border-radius: 3px;
      padding: 20px;
      text-align: center;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .result-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(26,18,8,0.4);
      margin-bottom: 8px;
    }

    .result-number {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      color: var(--ink);
      line-height: 1;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .result-number.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-sub {
      font-size: 11px;
      color: rgba(26,18,8,0.35);
      margin-top: 6px;
    }

    .divider {
      height: 1px;
      background: rgba(200,135,58,0.12);
      margin: 24px 0;
    }

    .footer {
      font-size: 10px;
      color: rgba(26,18,8,0.3);
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Page Converter</h1>
    <p>Physical ↔ E-book</p>
  </div>
  <div class="body">

    <div class="toggle-wrap">
      <button class="toggle-btn active" id="btn-physical" onclick="setMode('physical')">Physical</button>
      <button class="toggle-btn" id="btn-ebook" onclick="setMode('ebook')">E-book</button>
    </div>

    <div class="input-label" id="input-label">Enter physical page</div>
    <div class="input-row">
      <input type="number" id="page-input" placeholder="—" min="1" max="1341"
        oninput="convert()" onkeydown="if(event.key==='Enter') convert()" />
      <button class="convert" onclick="convert()">→</button>
    </div>

    <div class="result-box">
      <div class="result-label" id="result-label">E-book page</div>
      <div class="result-number" id="result-number">—</div>
      <div class="result-sub" id="result-sub"></div>
    </div>

    <div class="divider"></div>
    <div class="footer">14-point piecewise calibration</div>
  </div>
</div>

<script>
  // All confirmed calibration points: [physical, ebook]
  const points = [
    [43,   48],
    [80,   92],
    [224,  271],
    [354,  431],
    [441,  536],
    [460,  561],
    [483,  591],
    [525,  644],
    [569,  702],
    [656,  810],
    [743,  911],
    [865,  1061],
    [987,  1219],
    [1000, 1235],
    [1046, 1293],
  ];

  let mode = 'physical';

  function setMode(m) {
    mode = m;
    document.getElementById('btn-physical').classList.toggle('active', m === 'physical');
    document.getElementById('btn-ebook').classList.toggle('active', m === 'ebook');
    document.getElementById('input-label').textContent = m === 'physical' ? 'Enter physical page' : 'Enter e-book page';
    document.getElementById('result-label').textContent = m === 'physical' ? 'E-book page' : 'Physical page';
    document.getElementById('page-input').value = '';
    const el = document.getElementById('result-number');
    el.textContent = '—';
    el.classList.remove('show');
    document.getElementById('result-sub').textContent = '';
  }

  function physicalToEbook(p) {
    const n = points.length - 1;
    if (p <= points[0][0]) {
      const scale = (points[1][1] - points[0][1]) / (points[1][0] - points[0][0]);
      return points[0][1] + scale * (p - points[0][0]);
    }
    if (p >= points[n][0]) {
      const scale = (points[n][1] - points[n-1][1]) / (points[n][0] - points[n-1][0]);
      return points[n][1] + scale * (p - points[n][0]);
    }
    for (let i = 0; i < n; i++) {
      if (p >= points[i][0] && p <= points[i+1][0]) {
        const t = (p - points[i][0]) / (points[i+1][0] - points[i][0]);
        return points[i][1] + t * (points[i+1][1] - points[i][1]);
      }
    }
  }

  function ebookToPhysical(e) {
    const n = points.length - 1;
    if (e <= points[0][1]) {
      const scale = (points[1][1] - points[0][1]) / (points[1][0] - points[0][0]);
      return points[0][0] + (e - points[0][1]) / scale;
    }
    if (e >= points[n][1]) {
      const scale = (points[n][1] - points[n-1][1]) / (points[n][0] - points[n-1][0]);
      return points[n][0] + (e - points[n][1]) / scale;
    }
    for (let i = 0; i < n; i++) {
      if (e >= points[i][1] && e <= points[i+1][1]) {
        const t = (e - points[i][1]) / (points[i+1][1] - points[i][1]);
        return points[i][0] + t * (points[i+1][0] - points[i][0]);
      }
    }
  }

  function convert() {
    const val = parseInt(document.getElementById('page-input').value);
    const el = document.getElementById('result-number');
    const sub = document.getElementById('result-sub');

    if (!val || val < 1) {
      el.textContent = '—';
      el.classList.remove('show');
      sub.textContent = '';
      return;
    }

    let result, note = '';
    if (mode === 'physical') {
      result = Math.round(physicalToEbook(val));
      if (val < 43)   note = 'extrapolated (before calibration)';
      if (val > 1046) note = 'extrapolated (after calibration)';
    } else {
      result = Math.round(ebookToPhysical(val));
      if (val < 48)   note = 'extrapolated (before calibration)';
      if (val > 1293) note = 'extrapolated (after calibration)';
    }

    el.classList.remove('show');
    setTimeout(() => {
      el.textContent = result;
      el.classList.add('show');
      sub.textContent = note;
    }, 50);
  }
</script>
</body>
</html>
